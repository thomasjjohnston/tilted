name: Tilted
options:
  bundleIdPrefix: com.thomasjjohnston
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: true
    CURRENT_PROJECT_VERSION: 4
    MARKETING_VERSION: "0.1.4"

targets:
  Tilted:
    type: application
    platform: iOS
    sources:
      - path: Tilted
        type: group
        excludes:
          - Tilted.entitlements
    entitlements:
      path: Tilted/Tilted.entitlements
      properties:
        aps-environment: production
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thomasjjohnston.tilted
        INFOPLIST_KEY_NSAppTransportSecurity_AllowsArbitraryLoads: true
        CODE_SIGN_ENTITLEMENTS: Tilted/Tilted.entitlements
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: Tilted
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: true
        ENABLE_PREVIEWS: true
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Automatic
