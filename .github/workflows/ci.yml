name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server — lint, typecheck, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tilted
          POSTGRES_PASSWORD: tilted
          POSTGRES_DB: tilted
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: apps/server
        run: pnpm lint

      - name: Typecheck
        working-directory: apps/server
        run: pnpm typecheck

      - name: Test
        working-directory: apps/server
        run: pnpm test
        env:
          DATABASE_URL: postgresql://tilted:tilted@localhost:5432/tilted

  ios:
    name: iOS — build & test
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Build iOS
        working-directory: apps/ios/Tilted
        run: |
          xcodebuild build-for-testing \
            -scheme Tilted \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Test iOS
        working-directory: apps/ios/Tilted
        run: |
          xcodebuild test \
            -scheme Tilted \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

  deploy:
    name: Deploy to Fly
    runs-on: ubuntu-latest
    needs: [server]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
